<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyRecipes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">🍲 MyRecipes</div>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Recipes</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <h1>Welcome to My Recipes</h1>
    <p>Taste the best recipes in one place</p>
  </header>

  <!-- Recipes -->
  <section class="recipes-section">
    <h2>🍴Our Delicious Recipes🍴</h2>
    <div id="recipes-container" class="recipes-grid"></div>
  </section>

  <!-- Recipe Modal -->
  <div id="recipe-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2 id="modal-title"></h2>

      <h3>Ingredients</h3>
      <ul id="modal-ingredients"></ul>

      <h3>Steps</h3>
      <ol id="modal-steps"></ol>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>Contact: mariemmomdouh967@gmail.com</p>
    <p>© 2025 MyRecipes. All rights reserved.</p>
  </footer>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
